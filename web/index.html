<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tiny Town - An AI Agent-Driven World Simulation">
  <title>🏘️ Tiny Town</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="header">
    <div class="header-left">
      <h1>🏘️ Tiny Town</h1>
      <span id="clock" class="clock">Day 1 · 8:00 AM · ☀️ Sunny · 🌱 Spring</span>
    </div>
    <div class="header-right">
      <span id="connection-status" class="status-dot connected" title="Connected">●</span>
      <span class="status-label">Live</span>
    </div>
  </header>

  <main id="main">
    <!-- LEFT: Town Map + Agent Cards -->
    <section class="left-panel">
      <div class="panel" id="map-panel">
        <h2>🗺️ Town Map</h2>
        <div id="town-map" class="town-map"></div>
      </div>
      <div class="panel" id="agents-panel">
        <h2>👥 Citizens</h2>
        <div id="agent-cards" class="agent-cards"></div>
      </div>
    </section>

    <!-- CENTER: Event Feed -->
    <section class="center-panel">
      <div class="panel event-panel">
        <h2>📜 Event Feed <span id="event-count" class="badge">0</span></h2>
        <div class="event-filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="speech">💬 Speech</button>
          <button class="filter-btn" data-filter="movement">🚶 Move</button>
          <button class="filter-btn" data-filter="trade">💰 Trade</button>
          <button class="filter-btn" data-filter="politics">🗳️ Politics</button>
          <button class="filter-btn" data-filter="easter_egg">✨ Secrets</button>
        </div>
        <div id="event-feed" class="event-feed"></div>
      </div>
    </section>

    <!-- RIGHT: Economy + Politics -->
    <section class="right-panel">
      <div class="panel" id="economy-panel">
        <h2>📊 Economy</h2>
        <table id="market-table" class="market-table">
          <thead><tr><th>Item</th><th>Price</th><th>Supply</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="panel" id="politics-panel">
        <h2>🏛️ Politics</h2>
        <div id="politics-info"></div>
      </div>
      <div class="panel" id="stats-panel">
        <h2>📈 Town Stats</h2>
        <div id="stats-info"></div>
      </div>
    </section>
  </main>

  <!-- Toast container for live notifications -->
  <div id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
